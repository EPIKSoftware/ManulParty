<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>ManulParty</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #logo {
            position: fixed; top: 20px; left: 20px;
            width: 200px; height: auto; z-index: 20;
            pointer-events: none; filter: drop-shadow(0 0 5px rgba(196, 0, 255, 0.5));
        }
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 12px; height: 12px; border: 2px solid #c400ff; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #info {
            position: absolute; top: 180px; left: 20px;
            color: #00ff00; background: rgba(0,0,0,0.6);
            padding: 10px; pointer-events: none; font-size: 12px;
            border-radius: 4px; border-left: 3px solid #c400ff;
        }
    </style>
</head>
<body>
    <img src="MP.svg" id="logo" alt="ManulParty Logo">
    <div id="crosshair"></div>
    <div id="info">
        WASD = MOVE | SPACE = JUMP | P = LOAD PROJECT<br>
        <span id="status">Mode: Demo</span>
    </div>

    <input type="file" id="folderInput" webkitdirectory directory style="display:none;">

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        const collidableObjects = []; 
        let temporaryBlocks = [];

        const playerRadius = 0.6;
        const playerHeight = 1.7;
        let velocityY = 0;
        const gravity = 0.012;
        const jumpStrength = 0.25;
        let canJump = false;
        const keys = {};

        function generateRandomBlocks() {
            for (let i = 0; i < 40; i++) {
                const h = Math.random() * 6 + 1;
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(4, h, 4),
                    new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.6, 0.4) })
                );
                box.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
                box.updateMatrixWorld();
                scene.add(box);
                collidableObjects.push(box);
                temporaryBlocks.push(box);
            }
        }

        async function parseMobj(file, path) {
            const text = await file.text();
            const lines = text.split('\n').map(l => l.trim());
            if (lines[0] !== "ManulParty:Part") return;

            const posX = parseFloat(lines[1]) || 0;
            const posY = parseFloat(lines[2]) || 0;
            const posZ = parseFloat(lines[3]) || 0;
            const s1 = [parseFloat(lines[4])||1, parseFloat(lines[5])||1, parseFloat(lines[6])||1];
            const s2 = [parseFloat(lines[7])||1, parseFloat(lines[8])||1, parseFloat(lines[9])||1];

            const geometry = new THREE.BoxGeometry(s1[0]*s2[0], s1[1]*s2[1], s1[2]*s2[2]);
            const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: 0x888888 }));
            mesh.position.set(posX, posY, posZ);
            mesh.updateMatrixWorld();
            scene.add(mesh);
            collidableObjects.push(mesh);
        }

        const folderInput = document.getElementById('folderInput');
        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            temporaryBlocks.forEach(b => { 
                scene.remove(b); 
                const idx = collidableObjects.indexOf(b);
                if(idx > -1) collidableObjects.splice(idx, 1); 
            });
            temporaryBlocks = [];
            document.getElementById('status').innerText = "Mode: Project";
            
            const configFile = files.find(f => f.name.toLowerCase() === "config" || f.name.toLowerCase() === "config.txt");
            if (configFile) {
                const configText = await configFile.text();
                const title = configText.split('\n')[0].trim();
                if(title) document.title = `ManulParty - ${title}`;
            }

            for (const file of files) {
                const path = file.webkitRelativePath;
                if (path.toLowerCase().includes('/space/') && file.name.toLowerCase() === "main.mobj") {
                    await parseMobj(file, path);
                }
            }
        });

        const playerBox = new THREE.Box3();
        const tempBox = new THREE.Box3();

        function checkCollisions(newPos) {
            playerBox.setFromCenterAndSize(
                newPos.clone().setY(newPos.y - (playerHeight/2)), 
                new THREE.Vector3(playerRadius * 2, playerHeight, playerRadius * 2)
            );

            for (let obj of collidableObjects) {
                tempBox.setFromObject(obj);
                if (playerBox.intersectsBox(tempBox)) return true;
            }
            return false;
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.updateMatrixWorld();
        scene.add(ground);
        collidableObjects.push(ground);

        generateRandomBlocks();
        camera.position.set(0, 5, 15);

        document.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (e.code === "KeyP") { 
                if(document.pointerLockElement) document.exitPointerLock(); 
                folderInput.click(); 
            }
        });
        document.addEventListener("keyup", (e) => keys[e.code] = false);
        document.addEventListener("mousedown", () => {
            if(!document.pointerLockElement && document.activeElement !== folderInput) controls.lock();
        });

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = keys["ShiftLeft"] ? 0.3 : 0.15;
                const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).setY(0).normalize();
                const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion).setY(0).normalize();

                let moveDir = new THREE.Vector3(0,0,0);
                if (keys["KeyW"]) moveDir.add(forward);
                if (keys["KeyS"]) moveDir.sub(forward);
                if (keys["KeyA"]) moveDir.sub(right);
                if (keys["KeyD"]) moveDir.add(right);
                if (moveDir.length() > 0) moveDir.normalize().multiplyScalar(speed);

                let testPos = camera.position.clone();
                testPos.x += moveDir.x;
                if (!checkCollisions(testPos)) camera.position.x = testPos.x;

                testPos = camera.position.clone();
                testPos.z += moveDir.z;
                if (!checkCollisions(testPos)) camera.position.z = testPos.z;

                if (keys["Space"] && canJump) { velocityY = jumpStrength; canJump = false; }
                velocityY -= gravity;
                
                let nextY = camera.position.y + velocityY;
                testPos = camera.position.clone();
                testPos.y = nextY;

                if (checkCollisions(testPos)) {
                    if (velocityY < 0) canJump = true;
                    velocityY = 0;
                } else {
                    camera.position.y = nextY;
                    canJump = false;
                }

                if(camera.position.y < -15) camera.position.set(0, 5, 15);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
