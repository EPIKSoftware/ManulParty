<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>ManulParty DEMO</title>
    <style>
        #logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 160px;
            height: auto;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 0 5px rgba(196, 0, 255, 0.5));
        }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 12px; height: 12px; 
            border: 2px solid #c400ff; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <img src="MP.svg" id="logo" alt="ManulParty Logo">
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";


        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        const sensitivity = 2.5; 
        const collidableObjects = []; 

        document.addEventListener('mousemove', (e) => {
            if (controls.isLocked) {
                camera.rotation.y -= (e.movementX * 0.002) * sensitivity;
                camera.rotation.x -= (e.movementY * 0.002) * sensitivity;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                camera.rotation.z = 0;
            }
        });
        document.addEventListener("mousedown", () => controls.lock());

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        collidableObjects.push(ground);

        for (let i = 0; i < 60; i++) {
            const h = Math.random() * 8 + 1;
            const box = new THREE.Mesh(
                new THREE.BoxGeometry(4, h, 4),
                new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.5, 0.5) })
            );
            box.position.set(Math.random()*120-60, h/2, Math.random()*120-60);
            scene.add(box);
            collidableObjects.push(box);
        }

        camera.position.set(0, 5, 15);


        const raycaster = new THREE.Raycaster();
        const playerHeight = 1.7;
        let velocityY = 0;
        const gravity = 0.012;
        const jumpStrength = 0.25;
        let canJump = false;
        const keys = {};

        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);


        function canMove(direction, distance = 1.0) {

            const rayOrigins = [
                camera.position.clone().setY(camera.position.y - 1.0),
                camera.position.clone().setY(camera.position.y)
            ];
            
            for (let origin of rayOrigins) {
                raycaster.set(origin, direction);
                const hits = raycaster.intersectObjects(collidableObjects.filter(o => o !== ground));
                if (hits.length > 0 && hits[0].distance < distance) return false;
            }
            return true;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = 0.18;
                const inputDir = new THREE.Vector3();


                if (keys["KeyW"]) inputDir.z += 1;
                if (keys["KeyS"]) inputDir.z -= 1;
                if (keys["KeyA"]) inputDir.x -= 1;
                if (keys["KeyD"]) inputDir.x += 1;
                inputDir.normalize();

                if (inputDir.length() > 0) {

                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).setY(0).normalize();
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).setY(0).normalize();
                    

                    const moveX = right.multiplyScalar(inputDir.x * speed);
                    const moveZ = forward.multiplyScalar(inputDir.z * speed);

                    
                    if (canMove(moveX.clone().normalize(), 1.2)) {
                        camera.position.add(moveX);
                    }
                    if (canMove(moveZ.clone().normalize(), 1.2)) {
                        camera.position.add(moveZ);
                    }
                }

                
                if (keys["Space"] && canJump) {
                    velocityY = jumpStrength;
                    canJump = false;
                }
                velocityY -= gravity;
                camera.position.y += velocityY;

                
                const downRay = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
                const groundHits = downRay.intersectObjects(collidableObjects);
                if (groundHits.length > 0) {
                    const dist = groundHits[0].distance;
                    if (dist < playerHeight) {
                        velocityY = Math.max(0, velocityY);
                        camera.position.y += (playerHeight - dist);
                        canJump = true;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
